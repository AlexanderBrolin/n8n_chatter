# Пример конфигурации nginx (на отдельном хосте-прокси).
# Замените:
#   chat.example.com  — на ваш домен
#   10.0.0.10:5001    — на IP/порт хоста с docker-compose (APP_PORT из envfile)
#
# SSL-сертификаты добавьте по необходимости (certbot / вручную).

server {
    listen 80;
    server_name chat.example.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://10.0.0.10:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE — disable buffering for real-time streams
    location ~ /chat/api/(conversations/.*/stream|stream)$ {
        proxy_pass http://10.0.0.10:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
